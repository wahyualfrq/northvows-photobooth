  </defs>
  <rect x="0" y="0" width="600" height="800" fill="#F6F0E7" mask="url(#cutout)" />
  <rect x="40" y="40" width="520" height="520" rx="10" fill="none" stroke="#355C8A" stroke-width="1.5" />
  
